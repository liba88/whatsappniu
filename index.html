<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        html, body { margin: 0; padding: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .loader { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #25D366; border-radius: 50%; animation: s 0.6s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="ui"><div class="loader"></div></div>
    <iframe id="adminFrame" style="display:none; width:100vw; height:100vh; border:none;"></iframe>

    <script>
    (function() {
        const API_URL = "https://script.google.com/macros/s/AKfycbxaPzWyfb2Umi0rK75ybMS889KiH1kgrvneMlFFd6njh2qKR_xEjpDHViRFX3IRiiY/exec";
        
        // 【核心：本地极速池】包含你所有的号码，确保新设备 1.2 秒首跳
        const STATIC_POOL = ["8613800000001", "8613800000002", "8613800000003", "8613800000004"];

        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. 看板后台逻辑
        if (urlParams.get('view') === 'admin') {
            document.getElementById('ui').style.display = 'none';
            var frame = document.getElementById('adminFrame');
            frame.src = API_URL + "?view=admin";
            frame.style.display = "block";
            return;
        }

        // 2. 选号：优先用手机存的“未满名单”，没有就用“极速池”
        let availablePool = JSON.parse(localStorage.getItem('wa_pool_v5') || "[]");
        if (availablePool.length === 0) availablePool = STATIC_POOL;

        const target = availablePool[Math.floor(Math.random() * availablePool.length)];
        
        // 3. 【立即跳转】核心：这一行放在最前面，保证速度
        window.location.replace("https://wa.me/" + target);

        // 4. 【后台静默同步】不影响跳转速度
        new Image().src = `${API_URL}?mode=log&phone=${target}&t=${Date.now()}`;

        var xhr = new XMLHttpRequest();
        xhr.open("GET", API_URL + "?mode=get_all", true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    const latest = JSON.parse(xhr.responseText);
                    if (latest.length > 0) localStorage.setItem('wa_pool_v5', JSON.stringify(latest));
                } catch(e) {}
            }
        };
        xhr.send();
    })();
    </script>
</body>
</html>
