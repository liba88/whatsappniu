<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        /* 极致简约样式 */
        html, body { margin: 0; padding: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, sans-serif; overflow: hidden; }
        #ui { display: none; text-align: center; }
        .loader { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #25D366; border-radius: 50%; animation: s 0.6s linear infinite; margin: 0 auto 12px; }
        @keyframes s { to { transform: rotate(360deg); } }
        /* 看板专用：全屏铺满 */
        iframe { border: none; width: 100vw; height: 100vh; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="loader"></div>
        <p style="color: #666; font-size: 14px;">Connecting to support...</p>
    </div>

    <iframe id="adminFrame"></iframe>

    <script>
    (function() {
        // --- 1. 你的 Google 脚本链接 ---
        const API_URL = "https://script.google.com/macros/s/AKfycbxaPzWyfb2Umi0rK75ybMS889KiH1kgrvneMlFFd6njh2qKR_xEjpDHViRFX3IRiiY/exec";
        
        // --- 2. 核心分流：判断是管理员看后台，还是客户要跳转 ---
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('view') === 'admin') {
            // 如果是管理员访问 ?view=admin
            var frame = document.getElementById('adminFrame');
            frame.src = API_URL + "?view=admin";
            frame.style.display = "block";
            return; // 停止执行后面的跳转逻辑
        }

        // --- 3. 客户跳转逻辑（秒开版） ---
        const KEY_POOL = "wa_pool_final";
        const KEY_IDX = "wa_idx_final";

        let pool = [];
        try { pool = JSON.parse(localStorage.getItem(KEY_POOL) || "[]"); } catch(e) {}

        if (pool.length > 0) {
            // 缓存命中：秒跳
            let idx = parseInt(localStorage.getItem(KEY_IDX) || "0");
            if (idx >= pool.length) idx = 0;
            const target = pool[idx];
            localStorage.setItem(KEY_IDX, idx + 1);
            
            // 瞬间切走
            window.location.replace("https://wa.me/" + target);
            
            // 后台静默报数 + 异步更新池
            new Image().src = API_URL + "?mode=log&phone=" + target;
            fetchPool();
        } else {
            // 第一次访问：拉取数据
            document.getElementById('ui').style.display = 'block';
            fetchPool(true);
        }

        function fetchPool(isFirst) {
            var x = new XMLHttpRequest();
            x.open("GET", API_URL + "?mode=get_all", true);
            x.onreadystatechange = function() {
                if (x.readyState === 4 && x.status === 200) {
                    try {
                        const nums = JSON.parse(x.responseText);
                        if (nums.length > 0) {
                            localStorage.setItem(KEY_POOL, JSON.stringify(nums));
                            if (isFirst) {
                                window.location.replace("https://wa.me/" + nums[0]);
                                new Image().src = API_URL + "?mode=log&phone=" + nums[0];
                            }
                        }
                    } catch(e) {}
                }
            };
            x.send();
        }
    })();
    </script>
</body>
</html>
