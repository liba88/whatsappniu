<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <link rel="preconnect" href="https://script.google.com">
    <style>
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #ffffff; 
        }
        .container { text-align: center; }
        /* 极致精简的进度条 */
        .loader { 
            width: 28px; 
            height: 28px; 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #25D366; 
            border-radius: 50%; 
            animation: spin 0.7s linear infinite; 
            margin: 0 auto 12px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 { color: #075e54; font-size: 16px; font-weight: 500; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h3>Connecting to support...</h3>
    </div>

    <script>
        (function() {
            // 你的 Google 脚本 API 链接
            var api = "https://script.google.com/macros/s/AKfycbxaPzWyfb2Umi0rK75ybMS889KiH1kgrvneMlFFd6njh2qKR_xEjpDHViRFX3IRiiY/exec";

            var x = new XMLHttpRequest();
            x.open("GET", api, true);
            x.onreadystatechange = function() {
                if (x.readyState === 4 && x.status === 200) {
                    var p = x.responseText.trim();
                    if (p === "full") {
                        document.querySelector('h3').innerText = "Service currently full";
                    } else if (p.length > 5) {
                        // 瞬间跳转到 WhatsApp
                        window.location.replace("https://wa.me/" + p);
                    }
                }
            };
            x.send();
        })();
    </script>
</body>
</html>
